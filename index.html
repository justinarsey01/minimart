<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>My E-Commerce Store</h1>
        <div>
            <span id="add-product-btn">Add New Item</span>
            <span id="cart-icon">Cart (<span id="cart-count">0</span>)</span>
        </div>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="Search products...">
        </div>
    </header>

    <div class="products" id="product-list">
        <!-- Products will be dynamically added here -->
    </div>

    <div id="cart">
        <h2>Shopping Cart</h2>
        <div id="cart-items"></div>
        <p id="cart-total">Total: $0.00</p>
        <button id="checkout-btn">Checkout</button>
        <button id="close-cart">Close Cart</button>
    </div>

    <div id="add-product-form">
        <h2>Add New Product</h2>
        <input type="text" id="product-name" placeholder="Product Name">
        <input type="number" id="product-price" placeholder="Price" step="0.01" min="0">
        <input type="file" id="product-image" accept="image/*">
        <input type="text" id="product-image-url" placeholder="Image URL (optional)">
        <button onclick="addNewProduct()">Add Product</button>
        <button id="cancel-add-product">Cancel</button>
    </div>

<script src="script/mini.js"></script>
</body>
</html>
